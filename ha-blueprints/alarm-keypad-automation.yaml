blueprint:
  name: "Alarm Keypad — Arm/Disarm via RFID or NFC Tag"
  description: >
    When a registered RFID or NFC tag is scanned on the ESPHome alarm keypad,
    arm or disarm the Home Assistant Alarm Control Panel.

    The keypad fires an event for every scan; this blueprint checks the tag UID
    against your allowed list and calls the alarm panel service accordingly.

    Tip: scan a new tag and check the HA logbook to find its UID.
  domain: automation
  input:
    alarm_entity:
      name: Alarm Control Panel
      description: The HA alarm control panel this keypad controls.
      selector:
        entity:
          domain: alarm_control_panel

    alarm_code:
      name: Alarm Code (for disarm)
      description: >
        Code sent when disarming. Must match the code set in your HA alarm
        panel. Leave blank if your panel does not require a code to disarm.
      default: ""
      selector:
        text:
          type: password

    arm_mode:
      name: Tag Arm Mode
      description: >
        Which arm mode to use when the panel is disarmed and a tag is scanned.
      default: armed_away
      selector:
        select:
          options:
            - armed_away
            - armed_home
            - armed_night
            - armed_vacation

    allowed_nfc_uids:
      name: Allowed NFC Tag UIDs
      description: >
        Comma-separated list of NFC UIDs (from PN532 13.56 MHz reader).
        Example: "04:AB:CD:EF:12:34:56, 04:11:22:33:44:55:66"
        Find UIDs in the HA logbook after tapping each tag.
      default: ""
      selector:
        text:

    allowed_rfid_ids:
      name: Allowed RFID Tag IDs
      description: >
        Comma-separated list of RFID tag IDs in decimal (from Parallax 125 kHz
        reader). Example: "12345678, 87654321"
        Find IDs in the HA logbook after scanning each fob.
      default: ""
      selector:
        text:

    device_name:
      name: ESPHome Device Name
      description: >
        Must match the `name:` in the ESPHome YAML (default: alarm-keypad).
        Used to ignore events from other keypads on the same network.
      default: "alarm-keypad"
      selector:
        text:

trigger:
  - platform: event
    event_type: "esphome.alarm_keypad_nfc_tag"
    id: nfc_tag
  - platform: event
    event_type: "esphome.alarm_keypad_rfid_tag"
    id: rfid_tag

variables:
  dev: !input device_name
  nfc_allowed: !input allowed_nfc_uids
  rfid_allowed: !input allowed_rfid_ids

condition:
  - condition: template
    value_template: >
      {% if trigger.id == 'nfc_tag' %}
        {% set uid = trigger.event.data.uid | lower | trim %}
        {% set allowed = nfc_allowed.split(',') | map('trim') | map('lower') | list %}
        {{ uid in allowed and trigger.event.data.device == dev }}
      {% elif trigger.id == 'rfid_tag' %}
        {% set tag_id = trigger.event.data.tag_id | trim %}
        {% set allowed = rfid_allowed.split(',') | map('trim') | list %}
        {{ tag_id in allowed and trigger.event.data.device == dev }}
      {% else %}
        false
      {% endif %}

action:
  - variables:
      panel: !input alarm_entity
      code: !input alarm_code
      mode: !input arm_mode

  - choose:
      # Panel is disarmed → arm it
      - conditions:
          - condition: state
            entity_id: !input alarm_entity
            state: "disarmed"
        sequence:
          - service: "alarm_control_panel.alarm_{{ mode }}"
            target:
              entity_id: !input alarm_entity
            data:
              code: "{{ code }}"

      # Panel is armed or in a delay → disarm it
      - conditions:
          - condition: state
            entity_id: !input alarm_entity
            state:
              - "armed_away"
              - "armed_home"
              - "armed_night"
              - "armed_vacation"
              - "pending"
              - "arming"
        sequence:
          - service: alarm_control_panel.alarm_disarm
            target:
              entity_id: !input alarm_entity
            data:
              code: "{{ code }}"

mode: single
max_exceeded: silent
