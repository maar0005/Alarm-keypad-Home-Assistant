blueprint:
  name: Alarm Keypad — PIN Verification
  description: >
    Handles `esphome.alarm_keypad_code` events from the Alarm Keypad factory
    firmware.  The keypad never sends the raw PIN — it sends
    SHA-256(device_key + PIN) instead.  This automation verifies the hash
    using HA's built-in template filter and calls the alarm service on match.

    **No Python or external tools required.**
    Everything runs inside Home Assistant.

    **One-time setup per device:**

    1. Power on the keypad → connect to "Alarm Keypad Setup" hotspot →
       enter your home WiFi password.
    2. HA discovers the device and asks for an **API encryption key** →
       open `http://alarm-keypad.local/` (or the device's IP address) →
       copy the **Setup Key** value → paste it into HA.
    3. Import this Blueprint → fill in the three fields below → save.

    The **Device Key** field uses the same Setup Key you copied in step 2.

  domain: automation
  author: maar0005
  source_url: https://github.com/maar0005/Alarm-keypad-Home-Assistant

  input:
    alarm_entity:
      name: Alarm control panel
      description: The alarm_control_panel entity to arm/disarm.
      selector:
        entity:
          domain: alarm_control_panel

    alarm_pin:
      name: Alarm PIN
      description: >
        The PIN your alarm_control_panel is configured with.
        Stored only in HA — never sent to the device.
      selector:
        text:
          type: password

    device_key:
      name: Device Key
      description: >
        The unique per-device key shown on the device web page
        (`http://alarm-keypad.local/` → **Setup Key**).
        This is the same value you pasted into HA as the API encryption key.
      selector:
        text:

    device_name:
      name: Device name (optional, for multiple keypads)
      description: >
        The ESPHome device name suffix, e.g. `alarm-keypad-a1b2c3`.
        Leave blank if you only have one keypad.
      default: ""
      selector:
        text:

trigger:
  - platform: event
    event_type: esphome.alarm_keypad_code

condition:
  - condition: template
    value_template: >
      {{ not inputs.device_name or
         trigger.event.data.get('device', '') == inputs.device_name }}

action:
  - variables:
      received_hmac: "{{ trigger.event.data.get('hmac', '') }}"
      action:        "{{ trigger.event.data.get('action', 'disarm') }}"
      # HA computes the expected hash the same way the device does:
      # SHA-256(device_key_base64 + alarm_pin)
      expected_hmac: "{{ (inputs.device_key + inputs.alarm_pin) | hash('sha256') }}"
      hmac_ok: "{{ received_hmac == expected_hmac }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ action == 'disarm' and hmac_ok }}"
        sequence:
          - service: alarm_control_panel.alarm_disarm
            target:
              entity_id: !input alarm_entity
            data:
              code: !input alarm_pin

      - conditions:
          - condition: template
            value_template: "{{ action == 'arm_away' and hmac_ok }}"
        sequence:
          - service: alarm_control_panel.alarm_arm_away
            target:
              entity_id: !input alarm_entity

      - conditions:
          - condition: template
            value_template: "{{ not hmac_ok }}"
        sequence:
          - service: system_log.write
            data:
              message: >
                Alarm Keypad: wrong PIN hash received. Either the wrong PIN
                was entered or the Device Key in this Blueprint does not match
                the Setup Key shown on the device web page.
              level: warning

mode: single
max_exceeded: silent
