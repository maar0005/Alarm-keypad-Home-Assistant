blueprint:
  name: Alarm Keypad — PIN Verification
  description: >
    Handles `esphome.alarm_keypad_code` events from the Alarm Keypad factory
    firmware.  The keypad never sends the raw PIN — it sends
    SHA-256(device_salt + PIN) instead.  This automation verifies the hash
    using HA's built-in template filter and calls the alarm service on match.

    **No Python or external tools required.**
    Everything is done inside Home Assistant.

    **One-time setup per device:**

    1. In HA → go to the Alarm Keypad device page.
    2. Find **Device Salt** (diagnostic sensor) → copy the value.
    3. Find **Device Code** (diagnostic sensor) → copy and paste it into the
       **Pairing Code** text field on the same page to activate the keypad.
    4. Import this Blueprint and fill in the fields below.

  domain: automation
  author: maar0005
  source_url: https://github.com/maar0005/Alarm-keypad-Home-Assistant

  input:
    alarm_entity:
      name: Alarm control panel
      description: The alarm_control_panel entity to arm/disarm.
      selector:
        entity:
          domain: alarm_control_panel

    alarm_pin:
      name: Alarm PIN
      description: >
        The PIN your alarm_control_panel is configured with.
        Stored only in HA — never sent to the device.
      selector:
        text:
          type: password

    device_salt:
      name: Device Salt
      description: >
        Copy from the Alarm Keypad device page → Device Salt diagnostic sensor.
        This is the unique per-device value used to hash the PIN.
      selector:
        text:

    device_name:
      name: Device name (optional, for multiple keypads)
      description: >
        The ESPHome device name, e.g. `alarm-keypad-a1b2c3`.
        Leave blank if you only have one keypad.
      default: ""
      selector:
        text:

trigger:
  - platform: event
    event_type: esphome.alarm_keypad_code

condition:
  - condition: template
    value_template: >
      {{ not inputs.device_name or
         trigger.event.data.get('device', '') == inputs.device_name }}

action:
  - variables:
      received_hash: "{{ trigger.event.data.get('hash', '') }}"
      action:        "{{ trigger.event.data.get('action', 'disarm') }}"
      # HA computes the expected hash the same way the device does:
      # SHA-256(device_salt + alarm_pin)
      expected_hash: "{{ (inputs.device_salt + inputs.alarm_pin) | hash('sha256') }}"
      hash_ok: "{{ received_hash == expected_hash }}"

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ action == 'disarm' and hash_ok }}"
        sequence:
          - service: alarm_control_panel.alarm_disarm
            target:
              entity_id: !input alarm_entity
            data:
              code: !input alarm_pin

      - conditions:
          - condition: template
            value_template: "{{ action == 'arm_away' and hash_ok }}"
        sequence:
          - service: alarm_control_panel.alarm_arm_away
            target:
              entity_id: !input alarm_entity

      - conditions:
          - condition: template
            value_template: "{{ not hash_ok }}"
        sequence:
          - service: system_log.write
            data:
              message: >
                Alarm Keypad: wrong PIN hash received. Wrong PIN entered or
                Blueprint misconfigured (check device_salt matches the sensor).
              level: warning

mode: single
max_exceeded: silent
