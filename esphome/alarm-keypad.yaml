# =============================================================================
# Alarm Keypad — ESPHome Configuration
# Platform : Unexpected Maker FeatherS3 (ESP32-S3)
# =============================================================================
# This device is a pure keypad peripheral for HA's built-in alarm panel.
# It mirrors the HA alarm_control_panel state and sends all arm/disarm
# commands directly to that entity. HA owns all logic — entry/exit delays,
# lockout, notifications, automations.
#
# See docs/wiring-diagram.md for full pin reference.
# Copy secrets.yaml.template → secrets.yaml before flashing.
# =============================================================================

substitutions:
  device_name: alarm-keypad
  friendly_name: "Alarm Keypad"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -10
    then:
      - lambda: |-
          id(boot_count) += 1;
      - light.turn_on:
          id: status_led
          effect: "Pulse Blue"
      - delay: 3s
      - component.update: my_lcd

esp32:
  board: um_feathers3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

captive_portal:

# =============================================================================
# I2C Bus — SDA GPIO8, SCL GPIO9  (FeatherS3 STEMMA QT)
# =============================================================================
i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  frequency: 100kHz

# =============================================================================
# UART — Parallax RFID reader (125 kHz)
# RX: GPIO4   ENABLE: GPIO5  (drive LOW to read, HIGH to idle)
# =============================================================================
uart:
  id: rfid_uart
  rx_pin: GPIO4
  baud_rate: 2400

# =============================================================================
# Globals
# =============================================================================
globals:
  - id: boot_count
    type: int
    restore_value: true
    initial_value: "0"

  # Buffer for digits typed on the keypad
  - id: entered_code
    type: std::string
    restore_value: false
    initial_value: '""'

  # Tracks the previous HA alarm state so we can detect transitions
  - id: last_alarm_state
    type: std::string
    restore_value: false
    initial_value: '""'

  # LCD backlight timer — seconds remaining before dim (reset by PIR)
  - id: lcd_backlight_timer
    type: int
    restore_value: false
    initial_value: "30"

  # Set true when BH1750 reads below dim threshold
  - id: lcd_dim
    type: bool
    restore_value: false
    initial_value: "false"

# =============================================================================
# 1602 LCD via I2C PCF8574 backpack (0x27)
# Line 1: mirrors HA alarm panel state
# Line 2: entered code dots (masked) OR HA-controlled message
# =============================================================================
display:
  - platform: lcd_pcf8574
    id: my_lcd
    dimensions: 16x2
    address: 0x27
    update_interval: 500ms
    lambda: |-
      std::string st = id(ha_alarm_state).state;
      const char* label;
      if      (st == "disarmed")     label = "DISARMED       ";
      else if (st == "armed_away")   label = "ARMED AWAY     ";
      else if (st == "armed_home")   label = "ARMED HOME     ";
      else if (st == "armed_night")  label = "ARMED NIGHT    ";
      else if (st == "armed_vacation") label = "ARMED VACATION ";
      else if (st == "arming")       label = "ARMING...      ";
      else if (st == "pending")      label = "ENTRY DELAY    ";
      else if (st == "triggered")    label = "!! ALARM !!    ";
      else                           label = "CONNECTING...  ";

      it.print(0, 0, label);

      // Line 2: HA message override, or masked code entry, or blank
      if (id(lcd_message).state != "") {
        it.printf(0, 1, "%-16s", id(lcd_message).state.c_str());
      } else {
        std::string dots(id(entered_code).length(), '*');
        it.printf(0, 1, "%-16s", dots.c_str());
      }

# =============================================================================
# NeoPixel — GPIO40 (FeatherS3 built-in)
# Colour/effect mirrors HA alarm panel state
# =============================================================================
light:
  - platform: neopixelbus
    id: status_led
    type: GRB
    variant: WS2812
    pin: GPIO40
    num_leds: 1
    name: "${friendly_name} Status LED"
    effects:
      - pulse:
          name: "Pulse Blue"
          transition_length: 800ms
          update_interval: 800ms
      - pulse:
          name: "Pulse Orange"
          transition_length: 500ms
          update_interval: 500ms
      - automation:
          name: "Alarm Flash"
          sequence:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
                transition_length: 0s
            - delay: 150ms
            - light.turn_off:
                id: status_led
                transition_length: 0s
            - delay: 150ms

# =============================================================================
# Passive buzzer — GPIO6 via 2N7000 MOSFET gate (PWM / RTTTL)
# =============================================================================
output:
  - platform: ledc
    id: buzzer_pwm
    pin: GPIO6
    frequency: 2000Hz

rtttl:
  output: buzzer_pwm

# =============================================================================
# Scripts — buzzer tones
# =============================================================================
script:
  # Short click per keypress
  - id: beep_key
    then:
      - output.ledc.set_frequency:
          id: buzzer_pwm
          frequency: 1500Hz
      - output.set_level:
          id: buzzer_pwm
          level: 50%
      - delay: 60ms
      - output.set_level:
          id: buzzer_pwm
          level: 0%

  # Three rising tones — played when HA confirms armed
  - id: beep_arm
    then:
      - rtttl.play: "arm:d=8,o=5,b=180:c,e,g"

  # Three falling tones — played when HA confirms disarmed
  - id: beep_disarm
    then:
      - rtttl.play: "disarm:d=8,o=5,b=180:g,e,c"

  # Rejection — wrong code or action refused by HA
  - id: beep_error
    then:
      - rtttl.play: "err:d=4,o=4,b=120:g,e,c"

  # Short beep used every second during entry/exit delay
  - id: beep_delay_tick
    then:
      - output.ledc.set_frequency:
          id: buzzer_pwm
          frequency: 1000Hz
      - output.set_level:
          id: buzzer_pwm
          level: 50%
      - delay: 80ms
      - output.set_level:
          id: buzzer_pwm
          level: 0%

  # Triggered alarm — short urgent burst
  - id: beep_triggered
    mode: single
    then:
      - rtttl.play: "alarm:d=8,o=5,b=240:c6,p,c6,p,c6,p,c6"

  # Submit the entered code to HA alarm panel.
  # HA decides if it's right/wrong — no local PIN checking.
  # Arm if disarmed, disarm if armed/pending/arming.
  - id: submit_code
    then:
      - if:
          condition:
            lambda: 'return id(entered_code).empty();'
          then:
            - script.execute: beep_error
          else:
            - if:
                condition:
                  lambda: 'return id(ha_alarm_state).state == "disarmed";'
                then:
                  - homeassistant.service:
                      service: alarm_control_panel.alarm_arm_away
                      data:
                        entity_id: !secret alarm_entity
                        code: !lambda 'return id(entered_code);'
                else:
                  - homeassistant.service:
                      service: alarm_control_panel.alarm_disarm
                      data:
                        entity_id: !secret alarm_entity
                        code: !lambda 'return id(entered_code);'
            - lambda: 'id(entered_code) = "";'

# =============================================================================
# Text sensor — mirrors HA alarm_control_panel state (source of truth)
# Drives NeoPixel colour and buzzer tones on every state transition.
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: ha_alarm_state
    entity_id: !secret alarm_entity
    on_value:
      then:
        - lambda: |-
            std::string s = x;
            std::string prev = id(last_alarm_state);
            id(last_alarm_state) = s;

            // --- Tones on state transitions ---
            if (s == "disarmed" && prev != "disarmed" && prev != "") {
              id(beep_disarm).execute();
            } else if ((s == "armed_away" || s == "armed_home" ||
                        s == "armed_night" || s == "armed_vacation") &&
                       prev == "arming") {
              id(beep_arm).execute();
            } else if (s == "triggered" && prev != "triggered") {
              id(beep_triggered).execute();
            } else if (s == "pending" && prev != "pending") {
              // Entry delay started — first tick immediately
              id(beep_delay_tick).execute();
            }

        # --- NeoPixel colour per state ---
        - if:
            condition:
              lambda: 'return x == "disarmed";'
            then:
              - light.turn_on:
                  id: status_led
                  red: 0%
                  green: 100%
                  blue: 0%
                  brightness: 40%
                  effect: none

        - if:
            condition:
              lambda: >-
                return x == "armed_away" || x == "armed_home" ||
                       x == "armed_night" || x == "armed_vacation";
            then:
              - light.turn_on:
                  id: status_led
                  red: 100%
                  green: 0%
                  blue: 0%
                  brightness: 40%
                  effect: none

        - if:
            condition:
              lambda: 'return x == "arming";'
            then:
              - light.turn_on:
                  id: status_led
                  red: 100%
                  green: 40%
                  blue: 0%
                  brightness: 60%
                  effect: "Pulse Orange"

        - if:
            condition:
              lambda: 'return x == "pending";'
            then:
              - light.turn_on:
                  id: status_led
                  effect: "Pulse Blue"

        - if:
            condition:
              lambda: 'return x == "triggered";'
            then:
              - light.turn_on:
                  id: status_led
                  effect: "Alarm Flash"

        - component.update: my_lcd

  # ── HA-driven NeoPixel colour override ─────────────────────────────────────
  # Create sensor.alarm_led_farve in HA and set its state to "R,G,B"
  # (e.g. "255,0,0" for red) from an automation or template.  Whenever the
  # value changes the NeoPixel is updated immediately.  Any active effect
  # (pulse, flash) is replaced by the solid colour sent from HA.
  - platform: homeassistant
    id: alarm_led_color
    entity_id: sensor.alarm_led_farve
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string s = x;
            std::string delimiter = ",";
            size_t pos = 0;
            std::vector<int> rgb;
            while ((pos = s.find(delimiter)) != std::string::npos) {
              rgb.push_back(atoi(s.substr(0, pos).c_str()));
              s.erase(0, pos + delimiter.length());
            }
            rgb.push_back(atoi(s.c_str()));
            if (rgb.size() == 3) {
              auto call = id(status_led).make_call();
              call.set_effect("none");
              call.set_rgb(rgb[0] / 255.0f, rgb[1] / 255.0f, rgb[2] / 255.0f);
              call.set_brightness(1.0f);
              call.perform();
            }

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"

  - platform: template
    name: "${friendly_name} Boot Count"
    lambda: |-
      return {std::to_string(id(boot_count))};
    update_interval: never

# =============================================================================
# Text input from HA — overrides LCD line 2 (e.g. "Welcome home!")
# =============================================================================
text:
  - platform: template
    id: lcd_message
    name: "${friendly_name} LCD Message"
    optimistic: true
    min_length: 0
    max_length: 16
    mode: text
    initial_value: ""

# =============================================================================
# 4×4 Membrane Keypad
# Rows: GPIO15–18   Cols: GPIO11–14
#
# Key layout:
#   [ 1 ][ 2 ][ 3 ][ A → Arm Away  ]
#   [ 4 ][ 5 ][ 6 ][ B → Arm Home  ]
#   [ 7 ][ 8 ][ 9 ][ C → Arm Night ]
#   [ * ][ 0 ][ # ][ D → (spare)   ]
#
#   #  = submit entered code to HA
#   *  = clear entry buffer
#   A/B/C = quick-arm (no code; HA config determines if code required)
# =============================================================================
matrix_keypad:
  id: keypad
  rows:
    - pin: GPIO15
    - pin: GPIO16
    - pin: GPIO17
    - pin: GPIO18
  columns:
    - pin:
        number: GPIO11
        mode: INPUT_PULLUP
    - pin:
        number: GPIO12
        mode: INPUT_PULLUP
    - pin:
        number: GPIO13
        mode: INPUT_PULLUP
    - pin:
        number: GPIO14
        mode: INPUT_PULLUP
  keys:
    - "1234"
    - "5678"
    - "9*0#"
    - "ABCD"
  has_diodes: false
  on_key_pressed:
    then:
      - lambda: |-
          char k = x;

          if (k == '#') {
            id(submit_code).execute();

          } else if (k == '*') {
            id(entered_code) = "";
            id(beep_key).execute();

          } else if (k == 'A') {
            // Quick arm away — code only if HA panel requires it for arming
            id(beep_key).execute();
            if (id(ha_alarm_state).state == "disarmed") {
              id(beep_arm).execute();
            }
          } else if (k == 'B') {
            id(beep_key).execute();
          } else if (k == 'C') {
            id(beep_key).execute();
          } else if (k == 'D') {
            id(beep_key).execute();
          } else {
            // Digit — max 8 characters
            if (id(entered_code).length() < 8) {
              id(entered_code) += k;
            }
            id(beep_key).execute();
          }

      # Quick-arm shortcuts — fire after beep_key finishes
      - if:
          condition:
            lambda: 'return x == "A" && id(ha_alarm_state).state == "disarmed";'
          then:
            - homeassistant.service:
                service: alarm_control_panel.alarm_arm_away
                data:
                  entity_id: !secret alarm_entity

      - if:
          condition:
            lambda: 'return x == "B" && id(ha_alarm_state).state == "disarmed";'
          then:
            - homeassistant.service:
                service: alarm_control_panel.alarm_arm_home
                data:
                  entity_id: !secret alarm_entity

      - if:
          condition:
            lambda: 'return x == "C" && id(ha_alarm_state).state == "disarmed";'
          then:
            - homeassistant.service:
                service: alarm_control_panel.alarm_arm_night
                data:
                  entity_id: !secret alarm_entity

# =============================================================================
# PIR Motion sensor — HC-SR501, GPIO21
# Wakes LCD backlight when motion is detected
# =============================================================================
binary_sensor:
  - platform: gpio
    id: pir_sensor
    pin:
      number: GPIO21
      mode: INPUT
    name: "${friendly_name} Motion"
    device_class: motion
    on_press:
      then:
        - lambda: |-
            id(lcd_backlight_timer) = 30;

# =============================================================================
# Sensors
# =============================================================================
sensor:
  # BME280 — temperature, humidity, pressure
  - platform: bme280_i2c
    address: 0x76
    update_interval: 60s
    temperature:
      name: "${friendly_name} Temperature"
      id: bme_temp
    humidity:
      name: "${friendly_name} Humidity"
      id: bme_humidity
    pressure:
      name: "${friendly_name} Pressure"
      id: bme_pressure

  # BH1750 — ambient light; drives LCD auto-dim
  - platform: bh1750
    address: 0x23
    name: "${friendly_name} Light Level"
    id: light_level
    update_interval: 10s
    on_value:
      then:
        - lambda: |-
            id(lcd_dim) = (x < 10.0f);

  # Battery voltage — FeatherS3 VBAT divider on GPIO2
  - platform: adc
    pin: GPIO2
    id: battery_voltage_raw
    name: "${friendly_name} Battery Voltage"
    update_interval: 30s
    attenuation: 11dB
    filters:
      - multiply: 2.0
    unit_of_measurement: "V"
    accuracy_decimals: 2
    on_value:
      then:
        - sensor.template.publish:
            id: battery_percent
            state: !lambda |-
              float pct = (x - 3.0f) / (4.2f - 3.0f) * 100.0f;
              return std::clamp(pct, 0.0f, 100.0f);

  - platform: template
    id: battery_percent
    name: "${friendly_name} Battery"
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"

# =============================================================================
# PN532 NFC reader — I2C 0x24
# Fires an HA event with the tag UID — handle whitelisting in HA automations.
# =============================================================================
pn532_i2c:
  address: 0x24
  update_interval: 500ms
  on_tag:
    then:
      - lambda: |-
          ESP_LOGI("nfc", "Tag UID: %s", x.c_str());
      - homeassistant.event:
          event: "esphome.alarm_keypad_nfc_tag"
          data:
            uid: !lambda 'return x;'
            device: "${device_name}"

# =============================================================================
# Parallax RFID reader — UART 2400 baud
# Fires an HA event with the tag ID — handle whitelisting in HA automations.
# =============================================================================
rdm6300:
  uart_id: rfid_uart
  id: rfid_reader
  on_tag:
    then:
      - lambda: |-
          ESP_LOGI("rfid", "Tag ID: %u", x);
      - homeassistant.event:
          event: "esphome.alarm_keypad_rfid_tag"
          data:
            tag_id: !lambda 'return std::to_string(x);'
            device: "${device_name}"

# =============================================================================
# Interval — 1 s tick
# Beeps during entry/exit delays; manages LCD backlight timer
# =============================================================================
interval:
  - interval: 1s
    then:
      - lambda: |-
          // LCD backlight countdown (reset by PIR)
          if (id(lcd_backlight_timer) > 0) id(lcd_backlight_timer)--;

      # Audible tick during entry delay (pending) and exit delay (arming)
      - if:
          condition:
            lambda: >-
              return id(ha_alarm_state).state == "pending" ||
                     id(ha_alarm_state).state == "arming";
          then:
            - script.execute: beep_delay_tick

# =============================================================================
# Restart button (visible in HA)
# =============================================================================
button:
  - platform: restart
    name: "${friendly_name} Restart"
