name: Build & Publish Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build the factory binary using esphome/build-action
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build factory firmware
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.build.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Build alarm-keypad-factory
        uses: esphome/build-action@v7
        id: build
        with:
          yaml-file: esphome/alarm-keypad-factory.yaml

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: alarm-keypad-firmware
          path: ${{ steps.build.outputs.name }}/
          retention-days: 90

      # On tagged releases → publish .factory.bin and .ota.bin to GitHub Releases
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.factory.bin
            ${{ steps.build.outputs.name }}/${{ steps.build.outputs.name }}.ota.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy web flash page to GitHub Pages
  # Enable in repo: Settings → Pages → Source: GitHub Actions
  # ─────────────────────────────────────────────────────────────────────────
  deploy-flash-page:
    name: Deploy flash page
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: alarm-keypad-firmware
          path: docs/flash/firmware/

      - uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/flash/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
